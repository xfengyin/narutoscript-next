# 火影忍者手游 UI 坐标配置
# 基准分辨率: 1280x720 (16:9)
# 所有坐标会根据实际分辨率自动缩放

# ===== 主界面 =====
main_menu:
  # 底部导航栏
  bottom_nav:
    home: [640, 680]       # 主页
    ninja: [320, 680]      # 忍者
    battle: [960, 680]     # 战斗
    guild: [160, 680]      # 组织
    shop: [1120, 680]      # 商店
  
  # 顶部资源区
  top_resources:
    gold: [200, 30]        # 金币位置（OCR识别）
    copper: [400, 30]      # 铜币位置
    stamina: [600, 30]     # 体力位置
  
  # 常用按钮
  buttons:
    close: [1200, 50]      # 关闭弹窗
    back: [80, 50]         # 返回
    confirm: [640, 500]    # 确认按钮（通用位置）
    cancel: [400, 500]     # 取消按钮

# ===== 日常任务 =====
daily:
  # 任务入口位置
  entries:
    team_raid: [500, 400]     # 小队突袭
    bounty_hall: [700, 400]   # 丰饶之间
    guild_pray: [300, 300]    # 组织祈福
    survival: [900, 400]      # 生存试炼
    equipment: [600, 500]     # 装备扫荡
    task_hall: [400, 300]     # 任务集会所
    secret_realm: [800, 300]  # 秘境挑战
    shop: [1000, 300]         # 商店购买
  
  # 小队突袭
  team_raid:
    enter: [500, 400]         # 进入入口
    select_difficulty: [640, 300]  # 选择难度
    start_battle: [640, 500]  # 开始战斗
    auto_battle: [1200, 600]  # 自动战斗
    claim_reward: [640, 400]  # 领取奖励
    repeat_times: 3           # 重复次数
  
  # 丰饶之间
  bounty_hall:
    enter: [700, 400]
    select_type: [400, 300]   # 选择类型（铜币/金币/经验）
    start: [640, 500]
    auto: [1200, 600]
    claim: [640, 400]
    repeat_times: 3
  
  # 组织祈福
  guild_pray:
    enter_guild: [160, 680]   # 进入组织
    pray_button: [640, 400]   # 祈福按钮
    select_level: [400, 300]  # 选择祈福等级
    confirm: [640, 500]
    repeat_times: 1
  
  # 生存试炼
  survival:
    enter: [900, 400]
    start: [640, 500]
    auto: [1200, 600]
    next_floor: [640, 400]
    claim_all: [640, 300]
  
  # 装备扫荡
  equipment:
    enter: [600, 500]
    select_stage: [400, 300]  # 选择关卡
    sweep: [640, 500]         # 扫荡
    sweep_times: [800, 300]   # 扫荡次数选择
    confirm: [640, 400]
    claim: [640, 300]
  
  # 任务集会所
  task_hall:
    enter: [400, 300]
    claim_all: [640, 400]     # 领取全部
    refresh: [1000, 300]      # 刷新任务
  
  # 秘境挑战
  secret_realm:
    enter: [800, 300]
    select_realm: [400, 400]  # 选择秘境类型
    start: [640, 500]
    auto: [1200, 600]
    claim: [640, 400]
    repeat_times: 2
  
  # 商店购买
  shop:
    enter: [1120, 680]
    daily_shop: [300, 300]    # 日常商店
    buy_all: [640, 400]       # 全部购买
    confirm: [640, 500]

