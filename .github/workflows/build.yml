name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: web
        run: npm install
      
      - name: Build frontend
        working-directory: web
        run: npm run build
      
      - name: Copy to internal/ui/dist
        run: |
          mkdir -p internal/ui/dist
          cp -r web/dist/* internal/ui/dist/ || true
      
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: internal/ui/dist
          if-no-files-found: ignore

  build-backend:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: amd64
            ext: ''

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: internal/ui/dist
        continue-on-error: true
      
      - name: Create fallback HTML
        run: |
          mkdir -p internal/ui/dist
          if [ ! -f internal/ui/dist/index.html ]; then
            echo '<!DOCTYPE html><html><head><title>NarutoScript Next</title></head><body><h1>Please build frontend</h1></body></html>' > internal/ui/dist/index.html
          fi
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o narutoscript-next${{ matrix.ext }} ./cmd/main.go
      
      - name: Create package
        run: |
          mkdir -p release
          cp narutoscript-next${{ matrix.ext }} release/
          cp config.example.yaml release/config.yaml || true
          cp README.md release/ || true
          cd release && zip -r ../narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}
          path: narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    needs: build-backend
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List files
        run: find artifacts -type f
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
          generate_release_notes: true
          body: |
            ## NarutoScript Next ${{ github.ref_name }}
            
            ### 下载说明
            - Windows: `narutoscript-next-windows-amd64.zip`
            - macOS Intel: `narutoscript-next-darwin-amd64.zip`
            - macOS M1/M2: `narutoscript-next-darwin-arm64.zip`
            - Linux: `narutoscript-next-linux-amd64.zip`