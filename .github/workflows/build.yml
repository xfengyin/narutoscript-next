name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  build-backend:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: amd64
            ext: ''

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create fallback HTML
        run: |
          mkdir -p internal/ui/dist
          cat > internal/ui/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>NarutoScript Next</title></head>
          <body style="background:#1a1a2e;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh">
          <div style="text-align:center"><h1>NarutoScript Next</h1><p>API: /api/status | /api/tasks</p></div>
          </body></html>
          EOF
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Tidy dependencies
        run: go mod tidy
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o narutoscript-next${{ matrix.ext }} ./cmd/main.go
      
      - name: Create package
        run: |
          mkdir -p release
          cp narutoscript-next${{ matrix.ext }} release/
          cp config.example.yaml release/config.yaml || true
          cp README.md release/ || true
          cd release && zip -r ../narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}
          path: narutoscript-next-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    needs: build-backend
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true