# NarutoScript Next 配置文件
# MuMu 模拟器专用配置

server:
  port: 8080
  auto_open_browser: true

device:
  # MuMu 模拟器 ADB 路径（自动检测，无需手动配置）
  adb_path: ""
  # MuMu 模拟器默认分辨率
  screen_width: 1280
  screen_height: 720

automation:
  max_concurrency: 3
  retry_count: 3
  retry_delay: 1000

# MuMu 模拟器说明:
# 1. 确保已安装 MuMu 模拟器
# 2. MuMu 12 默认端口: 7555
# 3. 多开实例端口: 16384, 16416, 16448, 16480
# 4. 程序会自动检测并连接